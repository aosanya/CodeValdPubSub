syntax = "proto3";

package codevaldpubsub.v1;

option go_package = "github.com/aosanya/CodeValdPubSub/gen/go/codevaldpubsub/v1;codevaldpubsubv1";

import "google/protobuf/timestamp.proto";

// ── Events ────────────────────────────────────────────────────────────────────

// Event is a single recorded pub/sub event.
message Event {
  string                    id         = 1;
  string                    agency_id  = 2;
  string                    topic      = 3;
  string                    source     = 4;
  string                    payload    = 5;
  google.protobuf.Timestamp created_at = 6;
}

// PublishRequest carries the event data to record.
message PublishRequest {
  string agency_id = 1;
  string topic     = 2;
  string source    = 3;
  string payload   = 4;
}

// PublishResponse returns the recorded event.
message PublishResponse {
  Event event = 1;
}

// GetEventRequest retrieves a specific event by its entity ID.
message GetEventRequest {
  string agency_id = 1;
  string event_id  = 2;
}

// QueryEventsRequest lists events matching the given filters.
message QueryEventsRequest {
  string agency_id = 1;
  string topic     = 2;
  string source    = 3;
  int32  limit     = 4;
  // after filters to events whose published_at (or created_at fallback) is
  // >= this RFC3339 string. Empty means no lower bound. Server-side
  // post-fetch filter: entitygraph supports only equality filters, so this
  // is applied after ListEntities returns.
  string after = 5;
}

// QueryEventsResponse returns the matched events.
message QueryEventsResponse {
  repeated Event events = 1;
}

// ── Topics ────────────────────────────────────────────────────────────────────

// Topic is a registered named channel that groups related Events.
message Topic {
  string                    id             = 1;
  string                    pattern        = 2;
  string                    domain         = 3;
  string                    action         = 4;
  string                    source_service = 5;
  string                    description    = 6;
  google.protobuf.Timestamp created_at     = 7;
  google.protobuf.Timestamp updated_at     = 8;
}

// RegisterTopicRequest creates a new Topic.
message RegisterTopicRequest {
  string agency_id      = 1;
  string pattern        = 2;
  string domain         = 3;
  string action         = 4;
  string source_service = 5;
  string description    = 6;
}

// RegisterTopicResponse returns the created Topic.
message RegisterTopicResponse {
  Topic topic = 1;
}

// GetTopicRequest retrieves a Topic by ID.
message GetTopicRequest {
  string agency_id = 1;
  string topic_id  = 2;
}

// ListTopicsRequest lists Topics with optional filters.
message ListTopicsRequest {
  string agency_id = 1;
  string domain    = 2;
  string action    = 3;
  int32  limit     = 4;
}

// ListTopicsResponse returns the matched Topics.
message ListTopicsResponse {
  repeated Topic topics = 1;
}

// DeleteTopicRequest deletes a Topic by ID.
message DeleteTopicRequest {
  string agency_id = 1;
  string topic_id  = 2;
}

// DeleteTopicResponse is empty on success.
message DeleteTopicResponse {}

// RegisterTopicsRequest carries a producer's full topic list and a content hash.
// PubSub uses the hash to skip DB upserts when the topic set has not changed
// since the last registration for this (agency_id, source_service) pair.
message RegisterTopicsRequest {
  string          agency_id      = 1;
  string          source_service = 2;
  // produces_hash is SHA-256(sorted patterns joined by "\n"), hex-encoded.
  // If PubSub already holds this hash the call is a no-op — no DB writes occur.
  string          produces_hash  = 3;
  repeated string patterns       = 4;
}

// RegisterTopicsResponse is empty on success.
message RegisterTopicsResponse {}

// ── Subscriptions ─────────────────────────────────────────────────────────────

// Subscription represents a service's registration to receive events.
message Subscription {
  string                    id                 = 1;
  string                    subscriber_id      = 2;
  string                    subscriber_service = 3;
  string                    topic_pattern      = 4;
  string                    status             = 5;
  google.protobuf.Timestamp created_at         = 6;
  google.protobuf.Timestamp updated_at         = 7;
}

// SubscribeRequest creates a new Subscription.
message SubscribeRequest {
  string agency_id          = 1;
  string subscriber_id      = 2;
  string subscriber_service = 3;
  string topic_pattern      = 4;
  string topic_id           = 5;
}

// SubscribeResponse returns the created Subscription.
message SubscribeResponse {
  Subscription subscription = 1;
}

// GetSubscriptionRequest retrieves a Subscription by ID.
message GetSubscriptionRequest {
  string agency_id       = 1;
  string subscription_id = 2;
}

// ListSubscriptionsRequest lists Subscriptions with optional filters.
message ListSubscriptionsRequest {
  string agency_id          = 1;
  string subscriber_id      = 2;
  string subscriber_service = 3;
  string status             = 4;
  int32  limit              = 5;
}

// ListSubscriptionsResponse returns the matched Subscriptions.
message ListSubscriptionsResponse {
  repeated Subscription subscriptions = 1;
}

// UpdateSubscriptionRequest patches a Subscription's mutable fields.
message UpdateSubscriptionRequest {
  string agency_id       = 1;
  string subscription_id = 2;
  string status          = 3;
}

// UpdateSubscriptionResponse returns the updated Subscription.
message UpdateSubscriptionResponse {
  Subscription subscription = 1;
}

// UnsubscribeRequest cancels a Subscription.
message UnsubscribeRequest {
  string agency_id       = 1;
  string subscription_id = 2;
}

// UnsubscribeResponse is empty on success.
message UnsubscribeResponse {}

// ── Deliveries ────────────────────────────────────────────────────────────────

// Delivery tracks the push state for a single (Subscription, Event) pair.
message Delivery {
  string                    id              = 1;
  string                    subscription_id = 2;
  string                    event_id        = 3;
  // status is "pending" | "delivered" | "acked" | "failed".
  string                    status          = 4;
  int32                     attempt_count   = 5;
  google.protobuf.Timestamp last_attempted_at = 6;
  google.protobuf.Timestamp acked_at        = 7;
  google.protobuf.Timestamp created_at      = 8;
}

// AckRequest identifies the (agency, subscription, event) triple to acknowledge.
message AckRequest {
  string agency_id       = 1;
  string subscription_id = 2;
  string event_id        = 3;
}

// AckResponse is empty on success.
message AckResponse {}

// GetSubscribersForTopicRequest returns active subscriptions for a topic.
message GetSubscribersForTopicRequest {
  string agency_id = 1;
  string topic     = 2;
}

// GetSubscribersForTopicResponse returns the matched subscriptions.
message GetSubscribersForTopicResponse {
  repeated Subscription subscriptions = 1;
}

// ── Service ───────────────────────────────────────────────────────────────────

// PubSubService manages topics, events, and subscriptions for an agency.
service PubSubService {
  // ── Events ──────────────────────────────────────────────────────────────────
  // Publish records a new event in the agency's event log.
  rpc Publish(PublishRequest) returns (PublishResponse);
  // GetEvent retrieves a specific recorded event by its entity ID.
  rpc GetEvent(GetEventRequest) returns (Event);
  // QueryEvents lists recorded events matching the given filters.
  rpc QueryEvents(QueryEventsRequest) returns (QueryEventsResponse);

  // ── Topics ───────────────────────────────────────────────────────────────────
  // RegisterTopic creates a new named topic channel.
  rpc RegisterTopic(RegisterTopicRequest) returns (RegisterTopicResponse);
  // RegisterTopics upserts the full topic set for a producer service.
  // Idempotent on produces_hash: if PubSub already processed this exact hash
  // for (agency_id, source_service) no DB writes occur. Called by Cross on
  // every service heartbeat; the hash ensures only the first call per unique
  // topic-set hits the database.
  rpc RegisterTopics(RegisterTopicsRequest) returns (RegisterTopicsResponse);
  // GetTopic retrieves a topic by ID.
  rpc GetTopic(GetTopicRequest) returns (Topic);
  // ListTopics lists topics with optional domain/action filters.
  rpc ListTopics(ListTopicsRequest) returns (ListTopicsResponse);
  // DeleteTopic removes a topic.
  rpc DeleteTopic(DeleteTopicRequest) returns (DeleteTopicResponse);

  // ── Subscriptions ─────────────────────────────────────────────────────────────
  // Subscribe registers a service to receive events matching a topic pattern.
  rpc Subscribe(SubscribeRequest) returns (SubscribeResponse);
  // GetSubscription retrieves a subscription by ID.
  rpc GetSubscription(GetSubscriptionRequest) returns (Subscription);
  // ListSubscriptions lists subscriptions with optional filters.
  rpc ListSubscriptions(ListSubscriptionsRequest) returns (ListSubscriptionsResponse);
  // UpdateSubscription patches a subscription's mutable fields (e.g. status).
  rpc UpdateSubscription(UpdateSubscriptionRequest) returns (UpdateSubscriptionResponse);
  // Unsubscribe cancels a subscription.
  rpc Unsubscribe(UnsubscribeRequest) returns (UnsubscribeResponse);

  // ── Deliveries ───────────────────────────────────────────────────────────────
  // Ack records that Cross confirmed delivery for (subscriptionID, eventID).
  // Idempotent: calling Ack on an already-acked delivery is a no-op.
  rpc Ack(AckRequest) returns (AckResponse);
  // GetSubscribersForTopic returns all active Subscriptions whose topic_pattern
  // matches the given topic string exactly.
  rpc GetSubscribersForTopic(GetSubscribersForTopicRequest) returns (GetSubscribersForTopicResponse);
}
